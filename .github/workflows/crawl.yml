name: 장학금 크롤러

on:
  schedule:
    - cron: '0 23 * * *'  # 매일 오전 8시 KST (UTC 23:00)
  workflow_dispatch:       # GitHub에서 수동 실행 가능

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scholarship_crawler/requirements.txt

      - name: 패키지 설치
        run: |
          cd scholarship_crawler
          pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: playwright install --with-deps chromium

      - name: 크롤링 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd scholarship_crawler
          python main.py

      - name: DB 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scholarship_crawler/scholarships.db
          git diff --staged --quiet || git commit -m "chore: 장학금 DB 업데이트 $(date '+%Y-%m-%d')"
          git push
